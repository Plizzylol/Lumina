<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyLM</title>
    <link href="https://fonts.cdnfonts.com/css/product-sans" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Product Sans"', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', '"Noto Sans"', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      body {
        font-family: 'Product Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      html {
        scroll-behavior: smooth;
      }
      /* Custom Scrollbar */
      .scrollbar-custom::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .scrollbar-custom::-webkit-scrollbar-track {
        background-color: transparent;
      }
      .scrollbar-custom::-webkit-scrollbar-thumb {
        background-color: #A5B4FC; /* indigo-300 */
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .scrollbar-custom::-webkit-scrollbar-thumb:hover {
        background-color: #818CF8; /* indigo-400 */
      }
      .dark .scrollbar-custom::-webkit-scrollbar-thumb {
        background-color: #4F46E5; /* indigo-600 */
      }
      .dark .scrollbar-custom::-webkit-scrollbar-thumb:hover {
        background-color: #4338CA; /* indigo-700 */
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }

      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }
      .animate-scale-in {
        animation: scaleIn 0.2s ease-out forwards;
      }
    </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  }
}
</script>

</head>
  <body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">

  </body>
</html>
