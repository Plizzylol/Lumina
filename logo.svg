<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Blobs -->
  <g>
    <path d="M 85.3,57.1 C 92.2,74.5 75,92.5 57.1,92.5 C 39.2,92.5 28.9,80.1 22,62.7 C 15.1,45.3 28.4,22.5 46.3,22.5 C 64.2,22.5 78.4,39.7 85.3,57.1 Z" fill="#A5B4FC" opacity="0.7" transform="translate(1,1)" />
    <path d="M 85.3,57.1 C 92.2,74.5 75,92.5 57.1,92.5 C 39.2,92.5 28.9,80.1 22,62.7 C 15.1,45.3 28.4,22.5 46.3,22.5 C 64.2,22.5 78.4,39.7 85.3,57.1 Z" fill="#818CF8" transform="scale(0.95) translate(3,3)" />
  </g>

  <!-- Cards -->
  <g filter="url(#shadow)">
    <!-- Back Card (Checkmark) -->
    <g transform="rotate(-15 50 50) translate(-3, 3)">
      <rect x="28" y="22" width="40" height="55" rx="8" fill="#6366F1" />
      <circle cx="48" cy="48" r="10" stroke="white" stroke-width="2" fill="none" />
      <text x="48" y="54" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">✓</text>
    </g>
    <!-- Middle Card (A+) -->
    <g transform="rotate(-5 50 50) translate(0, 0)">
      <rect x="30" y="20" width="40" height="55" rx="8" fill="#6366F1" />
      <text x="50" y="54" font-family="system-ui, sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">A+</text>
    </g>
    <!-- Front Card (?) -->
    <g transform="rotate(8 50 50) translate(3, -3)">
      <rect x="32" y="24" width="40" height="55" rx="8" fill="#6366F1" />
      <text x="52" y="59" font-family="system-ui, sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold">?</text>
    </g>
  </g>
</svg>